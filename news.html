  <style>
    .news-toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      max-width: 400px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 11px 16px 11px 40px;
      color: var(--white);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-box input:focus { border-color: var(--blue); }
    .search-box input::placeholder { color: var(--gray); }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: .85rem;
      pointer-events: none;
    }
    .news-count { color: var(--gray); font-size: .88rem; white-space: nowrap; }

    /* Full news card */
    .news-card--full {
      grid-column: span 1;
      cursor: default;
    }
    .news-card--full:hover { transform: none; border-color: rgba(255,255,255,.07); }
    .news-card--full .news-card-img { height: 260px; }
    .news-card--full h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 14px; line-height: 1.4; }
    .news-full-content p { font-size: .92rem; color: var(--gray); line-height: 1.7; margin-bottom: 10px; }
    .news-full-content p:last-child { margin-bottom: 0; }
  </style>
</head>
